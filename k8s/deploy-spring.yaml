apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-boot-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-boot-app
  template:
    metadata:
      labels:
        app: spring-boot-app
    spec:
      containers:
      - name: spring-boot-app
        image: ammarzarouki8/myapp-backend
        ports:
        - containerPort: 8081
        env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:mysql://mysql-service:3306/demo
        - name: SPRING_DATASOURCE_USERNAME 
          value: root
        - name: SPRING_DATASOURCE_PASSWORD
          value: root
        - name: SPRING_DATASOURCE_PASSWORD
          value: com.mysql.cj.jdbc.Driver
        - name: SPRING_JPA_HIBERNATE_DDL_AUTO 
          value: update
        - name: SPRING_MVC_CORS_MAPPING
          value: /**
        - name: SPRING_MVC_CORS_ALLOWED_METHODS
          value: GET,POST,PUT,DELETE
        - name: SPRING_MVC_CORS_ALLOWED_HEADERS
          value: "*"
        - name: SPRING_MVC_CORS_ALLOWED_ORIGINS
          value: http://angular-app-service:80

